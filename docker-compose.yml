version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.backend
    ports:
      - "${BACKEND_GRPC_PORT:-50051}:50051"
      - "${BACKEND_TLS_PORT:-50151}:50151"
      - "${BACKEND_REST_PORT:-8081}:8081"
      - "${BACKEND_REST_TLS:-8181}:8181"
    environment:
      - TLS=1 # Always enable TLS so certificates are loaded
    volumes:
      - ./certs:/certs:ro

  gateway:
    build:
      context: ./backend
      dockerfile: Dockerfile.gateway
    environment:
      - BACKEND_HOST=backend
      - BACKEND_PORT=50051
      - GATEWAY_PORT=50052
      - REST_PORT=8080
      - TLS=${TLS:-0}
      - PROTOCOL=${PROTOCOL:-}
    ports:
      - "${GATEWAY_GRPC_PORT:-50052}:50052"
      - "${GATEWAY_REST_PORT:-8080}:8080"
    volumes:
      - ./certs:/certs:ro
    depends_on:
      - backend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - TLS=${TLS:-0}
    ports:
      - "${FRONTEND_PORT:-8082}:80"
    volumes:
      - ./certs:/certs:ro
    depends_on:
      - gateway
