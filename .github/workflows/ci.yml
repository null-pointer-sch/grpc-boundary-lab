name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CLOUD_RUN_REGION: europe-west1
  AR_REGION: europe-west1
  REPO_NAME: grpc-boundary-lab-eu
  PROJECT_ID: grpc-boundary-lab

jobs:
  # ── Gate: test & vet ───────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - run: go test ./...
      - run: go vet ./...

  # ── Build: parallel image builds (main only) ──────────────────────
  build-backend:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/957364549513/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions-deploy@grpc-boundary-lab.iam.gserviceaccount.com"

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.AR_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push backend image
        run: |
          IMAGE="${AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/backend:${GITHUB_SHA}"
          docker build -t "${IMAGE}" -f Dockerfile.backend .
          docker push "${IMAGE}"

  build-gateway:
    if: github.event_name == 'push'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/957364549513/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions-deploy@grpc-boundary-lab.iam.gserviceaccount.com"

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.AR_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push gateway image
        run: |
          IMAGE="${AR_REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO_NAME}/gateway:${GITHUB_SHA}"
          docker build -t "${IMAGE}" -f Dockerfile.gateway .
          docker push "${IMAGE}"

  # ── Deploy: Terraform apply (after both images are pushed) ────────
  deploy:
    if: github.event_name == 'push'
    needs: [build-backend, build-gateway]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/957364549513/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions-deploy@grpc-boundary-lab.iam.gserviceaccount.com"

      - uses: google-github-actions/setup-gcloud@v2

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: deploy/terraform
        run: terraform init

      - name: Terraform Apply
        working-directory: deploy/terraform
        run: |
          terraform apply -auto-approve \
            -var="project_id=${{ env.PROJECT_ID }}" \
            -var="region=${{ env.CLOUD_RUN_REGION }}" \
            -var="artifact_repo_id=${{ env.REPO_NAME }}" \
            -var="image_tag_backend=${{ github.sha }}" \
            -var="image_tag_gateway=${{ github.sha }}"

      - name: Output Cloud Run URL
        working-directory: deploy/terraform
        run: echo "Deployed to $(terraform output -raw cloud_run_url)"
